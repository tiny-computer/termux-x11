name: Build arm64 NDK library

on:
  push:
    branches:
      - master

jobs:
  build:
    name: "Build arm64 library"
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v4
      with:
        ref: master
        submodules: recursive
        fetch-depth: 1

    - name: Java setup
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build arm64 library
      run: ./gradlew externalNativeBuildRelease -Pandroid.abis=arm64-v8a

    - name: Strip debug symbols
      run: |
        STRIP=$(ls /usr/local/lib/android/sdk/ndk/*/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip | head -1)
        find app/build/intermediates/cxx/RelWithDebInfo -name 'libXlorie.so' -exec "$STRIP" --strip-debug {} \;

    - name: Store arm64 library
      uses: actions/upload-artifact@v4
      with:
        name: libXlorie-arm64
        path: app/build/intermediates/cxx/RelWithDebInfo/*/obj/arm64-v8a/libXlorie.so